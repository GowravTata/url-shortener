services:
  postgres:
    image: postgres:17
    container_name: url_shortener_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: url_shortener_redis
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:4.0.0
    container_name: url_shortener_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  api:
    build: .
    container_name: url_shortener_api
    env_file:
      - .env
    volumes:
      - .:/app
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 4
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - kafka

# Workers

  click_count_consumer:
    build: .
    container_name: click_count_consumer
    env_file:
      - .env
    volumes:
      - .:/app
    command: python -m scripts.click_counter_worker.py true
    depends_on:
      - kafka
      - postgres



  analytics_consumer:
    build: .
    container_name: analytics_consumer
    env_file:
      - .env
    volumes:
      - .:/app
    command: python -m scripts.kafka_worker.py true
    depends_on:
      - kafka
      - postgres

  archive_consumer:
    build: .
    container_name: archive_consumer
    env_file:
      - .env
    volumes:
      - .:/app
    command: python -m scripts.archival_worker.py true
    depends_on:
      - kafka
      - postgres

# Optional Development Tools

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka_ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    restart: unless-stopped
    ports:
      - "5540:5540"
    depends_on:
      - redis

volumes:
  postgres_data:
